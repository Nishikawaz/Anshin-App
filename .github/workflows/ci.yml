name: Anshin CI

on:
  push:
    branches: [ develop, "feature/**", "fix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ── Lint + Unit Tests ─────────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/

  # ── Security checks ───────────────────────────────────────────────────
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          # Buscar strings que parezcan API keys o passwords hardcodeados
          if grep -rE "(api_key|apikey|secret|password|passwd)\s*=\s*['\"][^'\"]{8,}" \
            --include="*.kt" --include="*.xml" --include="*.json" \
            --exclude-dir=".git" .; then
            echo "❌ Posibles secrets hardcodeados detectados"
            exit 1
          fi
          echo "✅ No se encontraron secrets hardcodeados"

      - name: Check for Log with financial data
        run: |
          if grep -rE "Log\.[deiw]\(.*\b(amount|balance|account|monto|saldo|cuenta)\b" \
            --include="*.kt" .; then
            echo "❌ Logs con datos financieros detectados"
            exit 1
          fi
          echo "✅ Sin logs con datos financieros"

      - name: Check for Double/Float in money fields
        run: |
          if grep -rE "(price|amount|balance|total|monto|saldo).*:\s*(Double|Float)" \
            --include="*.kt" .; then
            echo "❌ Double/Float para dinero detectado — usar Long"
            exit 1
          fi
          echo "✅ Montos correctamente tipados como Long"

  # ── Build APK Debug ───────────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [ test, security ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: anshin-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
